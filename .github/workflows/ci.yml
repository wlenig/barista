name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # status.mjs is macOS-only (it shells out to caffeinate)
    # tests skip on non-darwin
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: node --test tests/integration.test.mjs
